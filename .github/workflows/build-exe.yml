name: build-exe

# Build the standalone Windows exe on demand, and attach it to GitHub Releases
# when you push a version tag (e.g. `git tag v0.1.0 && git push --tags`).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build mousecast.exe
        run: python tools/build_exe.py
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mousecast-exe
          path: dist/mousecast.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mousecast.exe
