name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pure-core tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      # The Windows layer (mousehook/inject/controller) needs pywin32 and a real
      # Windows box, so CI only exercises the cross-platform core.
      - name: Run tests
        run: python -m pytest -q
